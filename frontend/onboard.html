<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HireIQ — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --canvas:#F2EFE7;--panel:#FBFAF5;--ink:#15161A;--ink-600:#54565E;--ink-400:#8C8D93;
  --hair:#D9D4C8;--hair-soft:#E8E3DA;--accent:#2747C9;--success:#1C6B4F;--warning:#B26A18;
  --sidebar:#15161A;--r-sm:6px;--r-md:11px;--r-lg:16px;--r-full:999px;
  --font-sans:'Hanken Grotesk',-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;font-family:var(--font-sans);background:var(--canvas);color:var(--ink);}
.shell{display:flex;height:100vh;overflow:hidden;}

/* ── Sidebar strip ── */
.sidebar{width:62px;background:var(--sidebar);display:flex;flex-direction:column;align-items:center;padding:20px 0;flex-shrink:0;}
.logo{font-size:15px;font-weight:700;color:#fff;letter-spacing:-0.02em;}
.logo span{color:var(--accent);}

/* ── Main ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:56px 24px 80px;}
.wizard{width:100%;max-width:680px;}

/* Step progress */
.steps{display:flex;align-items:center;gap:0;margin-bottom:48px;}
.step-item{display:flex;align-items:center;gap:0;flex:1;}
.step-item:last-child{flex:0;}
.step-dot{
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--hair);background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;
  color:var(--ink-400);flex-shrink:0;transition:all .2s;
}
.step-dot.done{background:var(--success);border-color:var(--success);color:#fff;}
.step-dot.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.step-line{flex:1;height:1.5px;background:var(--hair);}
.step-line.done{background:var(--success);}
.step-label{
  font-size:11px;font-weight:500;color:var(--ink-400);margin-top:6px;text-align:center;
  white-space:nowrap;
}
.step-label.active{color:var(--accent);}
.step-label.done{color:var(--success);}
.step-col{display:flex;flex-direction:column;align-items:center;gap:0;}

/* Card */
.card{background:#fff;border:1px solid var(--hair);border-radius:var(--r-lg);padding:32px 36px;margin-bottom:20px;}
.card-kicker{font-family:var(--font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
.card h2{font-size:24px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
.card p{font-size:14px;color:var(--ink-600);line-height:1.6;margin-bottom:24px;}

/* Fields */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:13px;font-weight:500;}
.field input,.field select,.field textarea{
  padding:10px 13px;border:1.5px solid var(--hair);border-radius:var(--r-md);
  background:#fff;font-family:inherit;font-size:14px;color:var(--ink);outline:none;
  transition:border-color .15s;resize:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

/* AI extraction panel */
.ai-panel{
  background:var(--accent);border-radius:var(--r-md);padding:20px 22px;margin-top:20px;
}
.ai-panel-head{
  display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#fff;margin-bottom:14px;
}
.ai-pulse{width:7px;height:7px;border-radius:50%;background:#7C92F2;animation:pulse 1.8s infinite;}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}
.chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.chip-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:6px;}
.chip{
  padding:4px 11px;border-radius:var(--r-full);font-size:12.5px;font-weight:500;
  background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.22);
}
.chip.disq{background:rgba(178,59,46,.25);border-color:rgba(178,59,46,.5);color:#f7a49e;}

/* Upload zone */
.upload-zone{
  border:2px dashed var(--hair);border-radius:var(--r-lg);padding:36px;text-align:center;
  background:var(--panel);cursor:pointer;transition:all .15s;
}
.upload-zone:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 4%,var(--panel));}
.upload-icon{font-size:28px;margin-bottom:10px;}
.upload-zone h3{font-size:16px;font-weight:600;margin-bottom:6px;}
.upload-zone p{font-size:13px;color:var(--ink-400);}
.upload-zone .mono{font-family:var(--font-mono);font-size:11px;color:var(--ink-400);margin-top:10px;}
.upload-btn{
  display:inline-block;margin-top:14px;padding:8px 20px;border-radius:var(--r-full);
  background:var(--accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;
}

/* Progress screen */
.prog-wrap{padding:8px 0;}
.phase-strip{display:flex;gap:0;margin-bottom:32px;border:1px solid var(--hair);border-radius:var(--r-md);overflow:hidden;}
.phase{flex:1;padding:14px 16px;font-size:13px;font-weight:500;color:var(--ink-400);background:#fff;border-right:1px solid var(--hair);text-align:center;}
.phase:last-child{border-right:none;}
.phase.done{background:color-mix(in srgb,var(--success) 9%,#fff);color:var(--success);}
.phase.active{background:color-mix(in srgb,var(--accent) 9%,#fff);color:var(--accent);}
.phase-check{margin-right:5px;}
.prog-bar-wrap{height:8px;background:var(--hair-soft);border-radius:var(--r-full);overflow:hidden;margin-bottom:28px;}
.prog-bar{height:100%;background:var(--accent);border-radius:var(--r-full);transition:width .6s ease;animation:prog-anim 2.2s ease-in-out infinite;}
@keyframes prog-anim{0%{width:42%}50%{width:71%}100%{width:42%}}
.honeypot-hero{
  background:color-mix(in srgb,var(--warning) 10%,var(--panel));
  border:1px solid color-mix(in srgb,var(--warning) 30%,var(--hair));
  border-radius:var(--r-md);padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:20px;
}
.honeypot-num{font-size:40px;font-weight:700;font-family:var(--font-mono);color:var(--warning);}
.honeypot-label{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.honeypot-sub{font-size:12.5px;color:var(--ink-400);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-box{background:#fff;border:1px solid var(--hair);border-radius:var(--r-md);padding:14px 16px;text-align:center;}
.stat-num{font-family:var(--font-mono);font-size:22px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.stat-label{font-size:12px;color:var(--ink-400);}

/* Nav */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.btn{
  padding:10px 22px;border-radius:var(--r-md);border:1.5px solid var(--hair);
  background:#fff;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;color:var(--ink);transition:all .15s;
}
.btn:hover{border-color:var(--ink-400);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover{opacity:.88;}
</style>
</head>
<body>
<div class="shell">

  <div class="sidebar">
    <div class="logo">H<span>I</span></div>
  </div>

  <div class="main">
    <div class="wizard">

      <!-- Step progress -->
      <div class="steps" id="steps-root"></div>

      <!-- Step content -->
      <div id="step-content"></div>

      <!-- Nav -->
      <div class="nav-row">
        <button class="btn" id="btn-back">← Back</button>
        <button class="btn btn-primary" id="btn-next">Continue →</button>
      </div>

    </div>
  </div>
</div>

<script>
const STEPS = [
  { label: "Workspace" },
  { label: "Job desc." },
  { label: "Candidates" },
  { label: "Ranking" },
];

let current = 0;

const STEP_HTML = [
  /* Step 1 — Workspace setup */
  `<div class="card">
    <div class="card-kicker">Step 1 of 4</div>
    <h2>Set up your workspace</h2>
    <p>Tell us about your organisation. This helps HireIQ calibrate scoring weights for your hiring context.</p>
    <div class="field-row">
      <div class="field"><label>Company name</label><input type="text" placeholder="Acme Corp" value="Redrob"></div>
      <div class="field"><label>Industry</label>
        <select><option>Technology</option><option>Finance</option><option>Healthcare</option><option>Other</option></select>
      </div>
    </div>
    <div class="field"><label>Team size</label>
      <select><option>1–10</option><option selected>11–50</option><option>51–200</option><option>201+</option></select>
    </div>
    <div class="field"><label>Your role</label><input type="text" placeholder="e.g. Head of Engineering" value="Recruiter"></div>
  </div>`,

  /* Step 2 — JD paste + AI extraction */
  `<div class="card">
    <div class="card-kicker">Step 2 of 4</div>
    <h2>Paste your job description</h2>
    <p>HireIQ extracts required skills, preferred qualifications, and disqualifiers automatically.</p>
    <div class="field">
      <label>Job description</label>
      <textarea rows="7" placeholder="Paste the full job description here…">We're hiring a Recommendation Systems Engineer to own and scale our ML ranking infrastructure. You will design, train and ship models that power personalised content feeds for 50M+ users.

Required: 3+ years ML engineering experience, Python, PyTorch or TensorFlow, experience with large-scale ranking or retrieval systems.
Preferred: MLOps, Kubeflow or SageMaker, experience with real-time serving.
Disqualifiers: no production ML experience, purely research background.</textarea>
    </div>
    <div class="ai-panel">
      <div class="ai-panel-head">
        <span class="ai-pulse"></span>
        AI extracted · 3 categories
      </div>
      <div class="chip-label">Required</div>
      <div class="chip-row">
        <span class="chip">Python</span><span class="chip">PyTorch / TensorFlow</span>
        <span class="chip">Ranking systems</span><span class="chip">3+ yrs ML eng.</span>
        <span class="chip">Production ML</span>
      </div>
      <div class="chip-label">Preferred</div>
      <div class="chip-row">
        <span class="chip">MLOps</span><span class="chip">Kubeflow / SageMaker</span>
        <span class="chip">Real-time serving</span>
      </div>
      <div class="chip-label">Disqualifiers</div>
      <div class="chip-row">
        <span class="chip disq">No prod ML experience</span>
        <span class="chip disq">Purely research background</span>
      </div>
    </div>
  </div>`,

  /* Step 3 — Dataset upload */
  `<div class="card">
    <div class="card-kicker">Step 3 of 4</div>
    <h2>Upload your candidate dataset</h2>
    <p>Upload a CSV or JSON export from your ATS. HireIQ accepts LinkedIn exports, Greenhouse, Lever, and plain CSV.</p>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📂</div>
      <h3>Drop your file here</h3>
      <p>CSV, JSON, or LinkedIn export · max 50 MB</p>
      <div class="mono">Accepted: .csv · .json · .xlsx</div>
      <div class="upload-btn">Browse files</div>
    </div>
    <input id="file-input" type="file" accept=".csv,.json,.xlsx" style="display:none" onchange="handleFile(this)">
    <div id="file-status" style="margin-top:14px;font-size:13px;color:var(--success);display:none;">
      ✓ 100 candidates loaded — ready to rank
    </div>
    <p style="margin-top:20px;font-size:12.5px;color:var(--ink-400);">
      No file? <a href="#" onclick="demoLoad();return false;" style="color:var(--accent);">Use the preloaded demo dataset (100 candidates)</a>.
    </p>
  </div>`,

  /* Step 4 — Ranking in progress */
  `<div class="card">
    <div class="card-kicker">Step 4 of 4 · Ranking in progress</div>
    <h2>Scoring your candidates</h2>
    <p>HireIQ is running the full intelligence pipeline across 100 candidates.</p>
    <div class="prog-wrap">
      <div class="phase-strip">
        <div class="phase done"><span class="phase-check">✓</span>Ingesting</div>
        <div class="phase active">Scoring</div>
        <div class="phase">Ranking</div>
        <div class="phase">Insights</div>
      </div>
      <div class="prog-bar-wrap"><div class="prog-bar"></div></div>
      <div class="honeypot-hero">
        <div class="honeypot-num">47</div>
        <div>
          <div class="honeypot-label">Honeypots caught · live</div>
          <div class="honeypot-sub">AI-generated or copy-pasted CVs flagged before scoring</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">100</div><div class="stat-label">Candidates</div></div>
        <div class="stat-box"><div class="stat-num">63</div><div class="stat-label">Scored so far</div></div>
        <div class="stat-box"><div class="stat-num">~45s</div><div class="stat-label">Remaining</div></div>
      </div>
    </div>
  </div>`,
];

function render() {
  // Steps
  let html = "";
  STEPS.forEach((s, i) => {
    const state = i < current ? "done" : i === current ? "active" : "";
    html += `<div class="step-col">
      <div class="step-dot ${state}">${i < current ? "✓" : i + 1}</div>
      <div class="step-label ${state}">${s.label}</div>
    </div>`;
    if (i < STEPS.length - 1) html += `<div class="step-line ${i < current ? "done" : ""}"></div>`;
  });
  document.getElementById("steps-root").innerHTML = html;

  document.getElementById("step-content").innerHTML = STEP_HTML[current];

  // Back button
  const back = document.getElementById("btn-back");
  back.style.visibility = current === 0 ? "hidden" : "visible";

  // Next button
  const next = document.getElementById("btn-next");
  if (current === STEPS.length - 1) {
    next.textContent = "View shortlist →";
  } else {
    next.textContent = "Continue →";
  }
}

document.getElementById("btn-next").addEventListener("click", () => {
  if (current < STEPS.length - 1) { current++; render(); }
  else { window.location.href = "index.html"; }
});
document.getElementById("btn-back").addEventListener("click", () => {
  if (current > 0) { current--; render(); }
});

function handleFile(input) {
  if (input.files.length) {
    document.getElementById("file-status").style.display = "block";
  }
}
function demoLoad() {
  document.getElementById("file-status").style.display = "block";
  document.getElementById("file-status").textContent = "✓ Demo dataset loaded — 100 candidates ready";
}

render();
</script>
</body>
</html>
