compute:
  platform: "Local CPU"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11"
  os: "Windows"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 10

ai_tools_used:
  - "Claude Code (Anthropic)"
  - "ChatGPT (OpenAI)"

ai_usage_summary: |
  Used Claude Code (Anthropic) and ChatGPT (OpenAI) for implementation assistance during
  development. All ranking logic is fully deterministic and rule-based — no AI API calls
  are made during the ranking step. The pipeline makes zero network calls at inference time.

methodology_summary: |
  Streaming rule-based ranker with honeypot detection, hard caps for disqualified
  titles or consulting-only careers, six weighted fit dimensions, and a behavioral
  reachability multiplier. The pipeline maintains only a top-200 heap during
  candidate streaming, then writes a validator-compliant top-100 CSV with either
  Dev B precomputed reasoning or candidate-specific fallback reasoning.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
